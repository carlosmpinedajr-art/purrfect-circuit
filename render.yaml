# Render Blueprint — connect repo at https://dashboard.render.com/blueprints
services:
  - type: web
    name: purrfect-circuit
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci --omit=dev
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production